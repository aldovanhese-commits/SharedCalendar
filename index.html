<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Onze Kalender</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kalender">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

    <header>
        <button id="prevWeek">◀</button>
        <h1 id="weekTitle">Week Overzicht</h1>
        <button id="nextWeek">▶</button>
        <button id="openSettingsBtn">⚙️</button>
    </header>

    <main>
        <div id="weekContainer" class="week-grid"></div>

        <button id="openModalBtn" class="fab">+</button>

        <div id="eventModal" class="modal">
            <div class="modal-content">
                <span class="close" id="closeEventModal">&times;</span>
                <h2>Nieuwe activiteit</h2>
                <form id="eventForm">
                    <div class="input-group">
                        <label>Wat gaan we doen?</label>
                        <input type="text" id="eventTitle" placeholder="Bv. Gaan eten, Cinema..." required>
                    </div>
                    <div class="input-group">
                        <label>Datum</label>
                        <input type="date" id="eventDate" required>
                    </div>
                    <div class="time-row">
                        <div class="input-group">
                            <label>Van</label>
                            <input type="time" id="eventStartTime" required>
                        </div>
                        <div class="input-group">
                            <label>Tot</label>
                            <input type="time" id="eventEndTime" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Wie?</label>
                        <select id="eventUser" required>
                            </select>
                    </div>
                    <button type="submit" class="btn-submit">Toevoegen</button>
                </form>
            </div>
        </div>

        <div id="dayDetailModal" class="modal">
            <div class="modal-content">
                <span class="close" id="closeDetailModal">&times;</span>
                <h2 id="detailDayTitle">Dagplanning</h2>
                
                <div id="dayEventsList"></div>

                <div id="editEventSection" style="display: none; border-top: 2px solid #e5e5ea; margin-top: 15px; padding-top: 15px;">
                    <h3>Activiteit aanpassen</h3>
                    <form id="editEventForm">
                        <input type="hidden" id="editEventId">
                        <div class="input-group">
                            <label>Wat gaan we doen?</label>
                            <input type="text" id="editEventTitle" required>
                        </div>
                        <div class="input-group">
                            <label>Datum</label>
                            <input type="date" id="editEventDate" required>
                        </div>
                        <div class="time-row">
                            <div class="input-group">
                                <label>Van</label>
                                <input type="time" id="editEventStartTime" required>
                            </div>
                            <div class="input-group">
                                <label>Tot</label>
                                <input type="time" id="editEventEndTime" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Wie?</label>
                            <select id="editEventUser" required>
                                </select>
                        </div>
                        <button type="submit" class="btn-submit">Wijzigingen Opslaan</button>
                        <button type="button" id="btnDeleteEvent" class="btn-delete-action">Verwijder Activiteit</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <span class="close" id="closeSettingsModal">&times;</span>
                <h2>Beheer Personen</h2>
                <form id="userForm">
                    <input type="text" id="newUserName" placeholder="Naam (bv. Marie, Thomas)" required>
                    <div class="color-picker-wrapper">
                        <label>Kies een kleur:</label>
                        <input type="color" id="newUserColor" value="#0071e3">
                    </div>
                    <button type="submit" class="btn-submit">Persoon Toevoegen</button>
                </form>
                <h3>Huidige personen:</h3>
                <div id="usersList"></div>
            </div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW OK"));
        }
    </script>
</body>
</html>
